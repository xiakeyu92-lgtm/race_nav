# ============================================================
# controller_params.yaml — DWB 局部规划器参数
# ============================================================

controller_server:
  ros__parameters:

    controller_plugins: ["FollowPath"]

    # --- DWB 速度/运动学参数 (在 ros__parameters 层级) ---
    min_vel_x: 0.0
    max_vel_x: 0.26
    min_vel_theta: -1.0
    max_vel_theta: 1.0
    min_speed_xy: 0.0

    acc_lim_x: 2.5
    acc_lim_theta: 3.2
    dec_lim_x: -2.5

    xy_goal_tolerance: 0.25
    yaw_goal_tolerance: 0.25
    latch_xy_goal_tolerance: false

    simulate_ahead_time: 2.0
    vx_samples: 20
    vy_samples: 0
    vth_samples: 40

    use_dwa: false

    transform_tolerance: 0.5

    # --- FollowPath 插件 + Critics (嵌套在 FollowPath 内) ---
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"

      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]

      RotateToGoal:
        plugin: "dwb_critics::RotateToGoal"
        scale: 32.0

      Oscillation:
        plugin: "dwb_critics::Oscillation"
        scale: 0.0
        oscillation_reset_dist: 0.05

      BaseObstacle:
        plugin: "dwb_critics::BaseObstacle"
        scale: 1.0

      GoalAlign:
        plugin: "dwb_critics::GoalAlign"
        scale: 24.0

      PathAlign:
        plugin: "dwb_critics::PathAlign"
        scale: 32.0

      PathDist:
        plugin: "dwb_critics::PathDist"
        scale: 32.0

      GoalDist:
        plugin: "dwb_critics::GoalDist"
        scale: 24.0