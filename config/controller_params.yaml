# ============================================================
# controller_params.yaml — DWB 局部规划器参数
# ============================================================
# DWB (Dynamic Window with Better scoring) = DWA 的增强版
# 关键: min_vel_x >= 0 → 禁止倒车 (环形赛道倒车会死)
# ============================================================

controller_server:
  ros__parameters:

    # ------ 控制器插件 ------
    controller_plugins: ["FollowPath"]

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"

      # --- Critics 评估器 (DWB 必须嵌套在 FollowPath 内!) ---
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]

      RotateToGoal:
        plugin: "dwb_critics::RotateToGoal"
        scale: 32.0

      Oscillation:
        plugin: "dwb_critics::Oscillation"
        scale: 0.0
        oscillation_reset_dist: 0.05

      BaseObstacle:
        plugin: "dwb_critics::BaseObstacle"
        scale: 1.0

      GoalAlign:
        plugin: "dwb_critics::GoalAlign"
        scale: 24.0

      PathAlign:
        plugin: "dwb_critics::PathAlign"
        scale: 32.0

      PathDist:
        plugin: "dwb_critics::PathDist"
        scale: 32.0

      GoalDist:
        plugin: "dwb_critics::GoalDist"
        scale: 24.0

    # ------ DWB 核心参数 ------

    # --- 速度约束 (关键!) ---
    # min_vel_x >= 0 → 绝对不能有负速度 → 不倒车
    min_vel_x: 0.0
    max_vel_x: 0.5
    min_vel_theta: -1.0
    max_vel_theta: 1.0
    min_speed_xy: 0.0

    # --- 加速度 ---
    acc_lim_x: 0.5
    acc_lim_theta: 1.5
    dec_lim_x: -1.0

    # --- 目标容忍度 ---
    xy_goal_tolerance: 0.15
    yaw_goal_tolerance: 0.3
    latch_xy_goal_tolerance: false

    # --- 轨迹模拟 ---
    simulate_ahead_time: 1.5
    vx_samples: 20
    vy_samples: 0
    vth_samples: 40

    # --- 逆运动学 ---
    use_dwa: false
    prune_plan: true

    # --- 旋转到位 ---
    max_vel_theta_when_stopped: 0.5