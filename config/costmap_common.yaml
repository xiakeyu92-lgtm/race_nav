# ============================================================
# costmap_common.yaml — local & global costmap 共用参数
# ============================================================
# /** 通配符: 所有 costmap 节点都会读取这里的参数
# ============================================================

/**:
  ros__parameters:

    # --- 机器人足印 (共用) ---
    robot_radius: 0.3          # 圆形足印; 要用多边形则注释掉
    # robot_footprint: "[[0.25, 0.20], [0.25, -0.20], [-0.25, -0.20], [-0.25, 0.20]]"

    # --- 障碍标记与清除 ---
    obstacle_range: 5.0        # 雷达检测障碍物的最远距离 (m)
    raytrace_range: 6.0        # 射线追踪清除障碍物的最远距离 (m)

    # --- 层叠插件 ---
    plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

    # --- 静态层 (来自地图) ---
    static_layer:
      plugin: "nav2_costmap_2d::StaticLayer"
      map_subscribe_transient_local: true

    # --- 障碍层 (来自雷达) ---
    obstacle_layer:
      plugin: "nav2_costmap_2d::ObstacleLayer"
      enabled: true
      observation_sources: "laser_scan"

      laser_scan:
        topic: "/scan"
        max_obstacle_height: 0.35
        min_obstacle_height: 0.05
        obstacle_max_range: 5.0
        obstacle_min_range: 0.15
        raytrace_max_range: 6.0
        raytrace_min_range: 0.15
        clearing: true
        marking: true
        data_type: "LaserScan"
        inf_is_valid: false

    # --- 膨胀层 ---
    inflation_layer:
      plugin: "nav2_costmap_2d::InflationLayer"
      inflation_radius: 0.4
      cost_scaling_factor: 2.5