# ============================================================
# global_costmap.yaml — 全局代价地图参数
# ============================================================
# 全局代价地图: A* 规划器用它算全局路径
# 特点: 覆盖整个地图、更新频率低、固定在地图坐标系上
# ============================================================

global_costmap:
  global_costmap:
    ros__parameters:

      # 更新频率 (不需要太频繁 — 全局地图是静态的)
      update_frequency: 2.0         # Hz
      publish_frequency: 1.0        # Hz

      # 坐标系
      global_frame: "map"           # ★ 全局代价图固定在 map 上
      robot_base_frame: "base_link"

      # 全局固定地图
      rolling_window: false

      # 分辨率 (m/pixel)
      resolution: 0.05

      # 插件
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      # 膨胀层
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.5       # 全局可以设大一点, 给 A* 留更多安全边距

      # 障碍层
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true

      # 静态层
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true

      transform_tolerance: 0.5
